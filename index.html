<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Daily — 論文に触れる</title>
<style>
  :root{
    --ink:#1a1a1a; --sub:#6b6b6b; --line:#e2e2e2;
    --bg:#f5f4ee; --grey:#e7e6e1; --grey-ink:#9a9a9a;
    --accent:#2b6f6a;
    --card-radius:6px;
    --eval:#3b6fb5;    /* 定番＝青 */
    --random:#8a5cb5;  /* 無作為＝紫 */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN",
                "Yu Gothic",Meiryo,sans-serif;
    color:var(--ink); background:var(--bg); font-size:15px; line-height:1.5;
  }

  .bar{
    position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:10px;
    padding:8px 14px; background:rgba(245,244,238,.95);
    border-bottom:1px solid var(--line); backdrop-filter:saturate(1.2) blur(4px);
  }
  .bar .title-app{font-weight:700; font-size:15px; letter-spacing:.01em;}
  .bar .grow{flex:1;}
  .bar button{
    font:inherit; font-size:13px; padding:5px 12px; cursor:pointer;
    border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--ink);
  }
  .bar button:hover{border-color:var(--accent); color:var(--accent);}
  .bar button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  .bar button.primary:hover{filter:brightness(1.08); color:#fff;}
  #ruby-toggle.off{ color:var(--sub); }
  .count{font-size:13px; color:var(--sub);}

  .intro{
    max-width:1500px; margin:0 auto; padding:14px 14px 0; color:var(--sub); font-size:13px; line-height:1.7;
  }
  .intro b{color:var(--ink);}

  .grid{
    display:grid; gap:12px; padding:14px; grid-template-columns:repeat(3,1fr);
    max-width:1500px; margin:0 auto;
  }
  @media (max-width:1100px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:720px){  .grid{grid-template-columns:1fr;} }

  .card{
    position:relative; border-radius:var(--card-radius);
    padding:10px 12px 8px; background:#fff; overflow:hidden;
    border:4px solid var(--line); transition:opacity .25s ease;
  }
  .card.slot-eval{border-color:var(--eval);}
  .card.slot-random{border-color:var(--random);}
  .card.removing{opacity:0;}

  .title{font-weight:650; line-height:2.05; padding-right:78px; word-break:break-word;}
  .meta{font-size:12px; color:var(--sub); margin:3px 0 6px;}
  .slot{display:inline-block; padding:1px 8px; border-radius:999px;
        font-weight:600; letter-spacing:.02em; font-size:11.5px; color:#fff;}
  .slot.slot-eval{background:var(--eval);}
  .slot.slot-random{background:var(--random);}
  .abst{font-size:13.5px; color:#333; white-space:pre-wrap; word-break:break-word; line-height:2.05;}
  .abst.clamp{display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;}
  .abst .empty{color:var(--grey-ink); font-style:italic;}
  .link{display:inline-block; margin-top:8px; font-size:12.5px; color:var(--accent); word-break:break-all;}
  .toggle{margin-top:6px; font-size:12px; color:var(--accent); cursor:pointer; user-select:none;
          background:none; border:none; padding:0;}
  .toggle:hover{text-decoration:underline;}

  /* ルビ */
  ruby{ ruby-align:center; }
  ruby rt{ font-size:.6em; font-weight:500; color:var(--accent); line-height:1.1; user-select:none; }
  /* ルビ OFF 時：rt を隠し、行間も素の英文向けに戻す（描画は維持＝切替が軽い） */
  body.ruby-off ruby rt{ display:none; }
  body.ruby-off .title{ line-height:1.4; }
  body.ruby-off .abst{ line-height:1.6; }

  .actions{position:absolute; top:8px; right:8px; display:flex; gap:5px;}
  .actions button{
    font:inherit; font-size:11.5px; line-height:1; padding:4px 8px; cursor:pointer;
    border-radius:5px; border:1px solid var(--line); background:#fff; color:var(--sub); white-space:nowrap;
  }
  .actions .donebtn{font-weight:600;}
  .actions .donebtn:hover{border-color:var(--accent); background:var(--accent); color:#fff;}
  .actions .playbtn:hover{border-color:var(--accent); color:var(--accent);}
  .actions .playbtn.playing{background:var(--accent); color:#fff; border-color:var(--accent);}

  .more-wrap{max-width:1500px; margin:0 auto; padding:0 14px 28px; text-align:center;}
  .more-wrap button{
    font:inherit; font-size:14px; padding:9px 22px; cursor:pointer;
    border:1px solid var(--accent); border-radius:7px; background:#fff; color:var(--accent);
  }
  .more-wrap button:hover{background:var(--accent); color:#fff;}
  .empty-state{padding:40px 16px; text-align:center; color:var(--sub);}
  .status-msg{font-size:13px; color:var(--sub); padding:0 14px 8px; max-width:1500px; margin:0 auto;}
</style>
</head>
<body>
  <div class="bar">
    <span class="title-app">Paper Daily</span>
    <button id="home">molingit</button>
    <span class="grow"></span>
    <button id="ruby-toggle">ルビ ON</button>
    <span class="count">残り <b id="remain">–</b></span>
  </div>

  <div class="intro">
    論文に触れるアプリへようこそ。査読付きで毎日7000本くらいの論文が出版されており、ここではそのわずかな断片に触れるお手伝いをしています。<b>よく引用されるもの</b>と<b>無作為</b>を混ぜて、タイトルと概要（abstract）を表示しています。何に繋がるかは知りませんが、知らない世界に触れてみたいという気持ちから作りました。
  </div>

  <div id="status" class="status-msg"></div>
  <div id="grid" class="grid"></div>
  <div class="more-wrap"><button id="more" style="display:none">つぎの12件を読む</button></div>

<script>
  /* ===== 設定（公開先に合わせて書き換え） ===== */
  // 同じPagesサイトに置いた papers.json（GitHub Actionsが毎日更新）。相対パスでOK。
  var PAPERS_URL = "./papers.json";
  // ejdict 原本は jsDelivr のCDN配信（個人アカウントの帯域・レート制限を肩代わり）。
  var EJDICT_URL = "https://cdn.jsdelivr.net/gh/molingit/ejdict@main/ejdict-hand-utf8.txt";
  var PER_BATCH_PER_SLOT = 6;   // 1回に各枠から出す件数（eval6 + random6 = 12）

  /* ===== 状態 ===== */
  var pools = { eval: [], random: [] };
  var ptr   = { eval: 0, random: 0 };
  var shown = {};                       // セッション内で出した id（積み足し時の重複防止）
  var readSet = loadSet("ptx_read");    // 「読んだ」を押した id。localStorage永続→二度と出さない
  var playingBtn = null;

  /* ===== localStorage ===== */
  function loadSet(key){
    var o = {};
    try{ (JSON.parse(localStorage.getItem(key)||"[]")||[]).forEach(function(id){o[id]=true;}); }catch(e){}
    return o;
  }
  function saveSet(key, obj){ try{ localStorage.setItem(key, JSON.stringify(Object.keys(obj))); }catch(e){} }

  /* ===== 辞書（ejdict 単独・jsDelivr＋IndexedDBキャッシュ） ===== */
  var ejdict = new Map();
  var irregular = new Map([
    ["analyses","analysis"],["data","datum"],["children","child"],["men","man"],["women","woman"],
    ["feet","foot"],["mice","mouse"],["went","go"],["gone","go"],["better","good"],["best","good"]
  ]);
  var FUNCTION_WORDS = new Set(("a an the this that these those some any no each every either neither " +
    "i you he she it we they me him her us them my your his its our their mine yours hers ours theirs " +
    "and or but nor so yet for as if then than because while although though unless whereas whether " +
    "of in on at to from by with about into onto over under above below between among through during " +
    "before after since until within without across against toward towards upon per via off out up down " +
    "is am are was were be been being do does did done have has had having will would shall should " +
    "can could may might must ought not also very more most such only just even much many few less least " +
    "here there where when why how what which who whom whose all both same other another own").split(/\s+/));

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function idbOpen(){ return new Promise(function(res,rej){
    try{ var r=indexedDB.open("paperDailyDict",1);
      r.onupgradeneeded=function(){ r.result.createObjectStore("kv"); };
      r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); };
    }catch(e){ rej(e); }
  });}
  function idbGet(k){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var t=db.transaction("kv","readonly").objectStore("kv").get(k);
    t.onsuccess=function(){ res(t.result); }; t.onerror=function(){ rej(t.error); };
  });});}
  function idbSet(k,v){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var t=db.transaction("kv","readwrite").objectStore("kv").put(v,k);
    t.onsuccess=function(){ res(true); }; t.onerror=function(){ rej(t.error); };
  });});}

  // ejdict-hand 形式: 「単語\t意味」。同義の綴り違いはカンマ列挙されるので各語を別キーに登録。
  function parseEjdict(text){
    ejdict.clear();
    var lines = text.split("\n");
    for(var i=0;i<lines.length;i++){
      var line = lines[i];
      var t = line.indexOf("\t");
      if(t<0) continue;
      var mean = line.slice(t+1).trim();
      var heads = line.slice(0,t).split(",");
      for(var h=0;h<heads.length;h++){
        var key = heads[h].trim().toLowerCase();
        if(key) ejdict.set(key, mean);
      }
    }
  }

  async function loadEjdict(){
    if(!EJDICT_URL) return;
    try{
      var cached = await idbGet("ejdict");
      if(cached && cached.url===EJDICT_URL && cached.text){ parseEjdict(cached.text); return; }
    }catch(e){}
    try{
      var text = await fetch(EJDICT_URL).then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); });
      parseEjdict(text);
      try{ await idbSet("ejdict", {url:EJDICT_URL, text:text}); }catch(e){}
    }catch(e){
      setStatus("辞書の読み込みに失敗しました（ルビなしで表示します）。");
      setTimeout(function(){ setStatus(""); }, 4000);
    }
  }

  function lemmaCandidates(w){
    var c=[w];
    if(irregular.has(w)) c.push(irregular.get(w));
    if(w.endsWith("ies") && w.length>4) c.push(w.slice(0,-3)+"y");
    if(w.endsWith("es")  && w.length>3){ c.push(w.slice(0,-2)); c.push(w.slice(0,-1)); }
    if(w.endsWith("s")   && w.length>3) c.push(w.slice(0,-1));
    if(w.endsWith("ied")) c.push(w.slice(0,-3)+"y");
    if(w.endsWith("ed")  && w.length>3){ c.push(w.slice(0,-2)); c.push(w.slice(0,-1)); }
    if(w.endsWith("ing") && w.length>4){ var s=w.slice(0,-3); c.push(s); c.push(s+"e"); if(/(.)\1$/.test(s)) c.push(s.slice(0,-1)); }
    return Array.from(new Set(c));
  }
  function lookup(raw){
    var w=raw.toLowerCase(), cands=lemmaCandidates(w);
    for(var i=0;i<cands.length;i++){ if(ejdict.has(cands[i])) return ejdict.get(cands[i]); }
    return null;
  }
  function rubyWrap(s, ja){
    if(!ja) return esc(s);
    var rt = ja.split(/[;；]/)[0].slice(0,12);
    return "<ruby>"+esc(s)+"<rt>"+esc(rt)+"</rt></ruby>";
  }
  function renderWord(word){
    if(/^[A-Z]{2,}$/.test(word)) return esc(word);
    if(FUNCTION_WORDS.has(word.toLowerCase())) return esc(word);
    return rubyWrap(word, lookup(word));
  }
  function renderRuby(text){
    text = String(text==null?"":text); var out="", i=0, n=text.length;
    while(i<n){
      var ch=text[i];
      if(/[A-Za-z]/.test(ch)){
        var m=/^[A-Za-z][A-Za-z'\-]*/.exec(text.slice(i)); out+=renderWord(m[0]); i+=m[0].length;
      } else {
        var nm=/^[^A-Za-z]+/.exec(text.slice(i)); out+=esc(nm[0]); i+=nm[0].length;
      }
    }
    return out;
  }

  /* ===== カード ===== */
  function slotLabel(s){ return {eval:'定番', random:'無作為'}[s] || s; }
  function cardHtml(p){
    var hasAbst = p.abst && String(p.abst).trim().length>0;
    var abstInner = hasAbst ? renderRuby(p.abst) : '<span class="empty">abstract なし（タイトルで判断）</span>';
    var linkHtml = p.url ? '<a class="link" href="'+esc(p.url)+'" target="_blank" rel="noopener">'+esc(p.url)+'</a>' : '';
    var slotClass = ({eval:'slot-eval',random:'slot-random'})[p.slot] || '';
    return ''+
    '<div class="card '+slotClass+'" data-id="'+esc(p.id)+'">'+
      '<div class="actions">'+
        '<button class="donebtn" data-act="read">読んだ</button>'+
        '<button class="playbtn" data-play>▶</button>'+
      '</div>'+
      '<div class="title">'+renderRuby(p.title||'（タイトルなし）')+'</div>'+
      '<div class="meta"><span class="slot '+slotClass+'">'+slotLabel(p.slot)+'</span></div>'+
      '<div class="abst clamp">'+abstInner+'</div>'+
      (hasAbst || p.url ? '<div class="extra" style="display:none">'+linkHtml+'</div>' : '')+
      (hasAbst ? '<button class="toggle" data-toggle>▼ もっと読む</button>' :
        (p.url ? '<button class="toggle" data-toggle>▼ リンク</button>' : ''))+
    '</div>';
  }

  var papersById = {};
  function nextBatch(){
    var batch=[];
    ['eval','random'].forEach(function(slot){
      var taken=0;
      while(ptr[slot] < pools[slot].length && taken < PER_BATCH_PER_SLOT){
        var p = pools[slot][ptr[slot]++];
        if(readSet[p.id] || shown[p.id]) continue;
        shown[p.id]=true; papersById[p.id]={title:p.title||'',abst:p.abst||''};
        batch.push(p); taken++;
      }
    });
    shuffleArr(batch);   // 定番・無作為を視覚的に混ぜる（件数は各6で固定）
    return batch;
  }
  function shuffleArr(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } }

  function remaining(){
    var n=0;
    ['eval','random'].forEach(function(s){
      for(var i=ptr[s]; i<pools[s].length; i++){ if(!readSet[pools[s][i].id] && !shown[pools[s][i].id]) n++; }
    });
    return n;
  }
  function refreshRemain(){ document.getElementById('remain').textContent = remaining(); }

  function appendBatch(){
    var batch = nextBatch();
    var grid = document.getElementById('grid');
    if(batch.length>0){
      grid.insertAdjacentHTML('beforeend', batch.map(cardHtml).join(''));
    }
    refreshRemain();
    var more = document.getElementById('more');
    if(remaining()>0){ more.style.display='inline-block'; }
    else {
      more.style.display='none';
      if(grid.children.length===0){
        grid.innerHTML='<div class="empty-state">ここまで。今日の分はすべて見ました。<br>（データは毎日入れ替わります）</div>';
      }
    }
  }

  /* ===== 操作 ===== */
  document.getElementById('grid').addEventListener('click', function(e){
    var card = e.target.closest('.card'); if(!card) return;
    var id = card.getAttribute('data-id');

    if(e.target.hasAttribute('data-toggle')){
      var abst = card.querySelector('.abst');
      var extra = card.querySelector('.extra');
      var open = abst.classList.toggle('clamp')===false;
      if(extra) extra.style.display = open ? 'block' : 'none';
      e.target.textContent = open ? '▲ 閉じる' : (abst.querySelector('.empty') ? '▼ リンク' : '▼ もっと読む');
      return;
    }
    if(e.target.hasAttribute('data-act')){
      // 「読んだ」: idを読了として永続保存→次回以降の母集団から除外→カードを消す
      readSet[id]=true; saveSet("ptx_read", readSet);
      dismissCard(card);
      return;
    }
    if(e.target.hasAttribute('data-play')){ togglePlay(id, e.target); return; }
  });

  function dismissCard(card){
    if(playingBtn && card.contains(playingBtn)) stopSpeech();
    card.classList.add('removing');
    setTimeout(function(){
      card.remove();
      var grid=document.getElementById('grid');
      if(grid.children.length===0 && remaining()===0){
        grid.innerHTML='<div class="empty-state">ここまで。今日の分はすべて見ました。<br>（データは毎日入れ替わります）</div>';
      }
      refreshRemain();
    }, 250);
  }

  /* ===== 読み上げ（Web Speech） ===== */
  function stopSpeech(){
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    if(playingBtn){ playingBtn.classList.remove('playing'); playingBtn.textContent='▶'; playingBtn=null; }
  }
  function togglePlay(id, btn){
    if(!('speechSynthesis' in window)){ setStatus('このブラウザは読み上げ非対応です。'); setTimeout(function(){setStatus('');},2500); return; }
    if(playingBtn===btn){ stopSpeech(); return; }
    stopSpeech();
    var p = papersById[id] || {title:'',abst:''};
    var title=(p.title||'').trim(), abst=(p.abst||'').trim();
    var text = abst ? (title+'. '+abst) : title;
    if(!text){ return; }
    var u=new SpeechSynthesisUtterance(text); u.lang='en-US';
    u.onend=stopSpeech; u.onerror=stopSpeech;
    btn.classList.add('playing'); btn.textContent='■'; playingBtn=btn;
    window.speechSynthesis.speak(u);
  }
  window.addEventListener('beforeunload', stopSpeech);

  /* ===== ツールバー ===== */
  document.getElementById('home').addEventListener('click', function(){ window.open('https://molingit.com','_blank','noopener'); });
  document.getElementById('more').addEventListener('click', appendBatch);

  /* ===== ルビ ON/OFF トグル（localStorageに保存・デフォルトON。方式b＝rtをCSSで隠す） ===== */
  function rubyIsOff(){ try{ return localStorage.getItem('ptd_ruby')==='off'; }catch(e){ return false; } }
  function applyRubyState(){
    var off = rubyIsOff();
    document.body.classList.toggle('ruby-off', off);
    var b = document.getElementById('ruby-toggle');
    if(b){ b.textContent = off ? 'ルビ OFF' : 'ルビ ON'; b.classList.toggle('off', off); }
  }
  document.getElementById('ruby-toggle').addEventListener('click', function(){
    var off = rubyIsOff();
    try{ localStorage.setItem('ptd_ruby', off ? 'on' : 'off'); }catch(e){}
    applyRubyState();
  });

  function setStatus(s){ document.getElementById('status').textContent=s; }

  /* ===== 初期化 ===== */
  (function init(){
    applyRubyState();   // ルビON/OFFの初期状態を反映
    setStatus('読み込み中…');
    Promise.all([
      loadEjdict(),
      fetch(PAPERS_URL, {cache:'no-store'}).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    ]).then(function(results){
      var data = results[1] || {};
      var arr = (data.papers||[]);
      arr.forEach(function(p){ if(p.slot==='eval') pools.eval.push(p); else if(p.slot==='random') pools.random.push(p); });
      shuffleArr(pools.eval); shuffleArr(pools.random);  // 母集団をシャッフル→継ぎ足しで新しい顔
      setStatus('');
      appendBatch();
    }).catch(function(err){
      setStatus('論文データの読み込みに失敗しました（' + (err && err.message) + '）。');
    });
  })();
</script>
</body>
</html>
